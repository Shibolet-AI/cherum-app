<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="חירום">
  <link rel="manifest" href="manifest.json">
  <title>חירום 🆘</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      direction: rtl;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    /* ── Screens ── */
    .screen {
      display: none;
      position: fixed;
      inset: 0;
      padding:
        env(safe-area-inset-top, 12px)
        env(safe-area-inset-right, 12px)
        env(safe-area-inset-bottom, 12px)
        env(safe-area-inset-left, 12px);
    }
    .screen.active { display: flex; flex-direction: column; }

    .form-screen {
      justify-content: flex-start;
      overflow-y: auto;
      gap: 18px;
      padding-top: max(env(safe-area-inset-top, 12px), 24px);
      padding-bottom: max(env(safe-area-inset-bottom, 12px), 24px);
    }

    .form-screen h1 { font-size: 22px; font-weight: 700; line-height: 1.4; }

    .instruction {
      font-size: 15px;
      color: #aaa;
      line-height: 1.7;
      background: #111;
      border-radius: 10px;
      padding: 14px 16px;
    }
    .instruction strong { color: #ddd; }

    label { display: block; font-size: 14px; color: #aaa; margin-bottom: 6px; }

    input[type="text"] {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 18px;
      padding: 14px 16px;
      direction: ltr;
      text-align: left;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      user-select: text;
      -webkit-user-select: text;
    }
    input[type="text"]:focus { border-color: #555; }

    .msg-input { direction: rtl; text-align: right; font-size: 18px; }

    .error-msg { color: #ff4444; font-size: 13px; display: none; }
    .error-msg.visible { display: block; }

    .btn-primary {
      background: #cc0000;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 20px;
      font-weight: 700;
      padding: 16px;
      width: 100%;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .btn-primary:active { opacity: 0.8; }

    .btn-back {
      background: #1a1a1a;
      color: #aaa;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      padding: 10px 16px;
      cursor: pointer;
      align-self: flex-start;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-back:active { opacity: 0.7; }

    /* ── Main Screen ── */
    #main-screen {
      padding: 8px;
      padding-top: max(env(safe-area-inset-top, 8px), 8px);
      padding-bottom: max(env(safe-area-inset-bottom, 8px), 28px);
      gap: 8px;
    }

    .emergency-btn {
      flex: 1;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: clamp(24px, 5.5vw, 40px);
      font-weight: 800;
      cursor: pointer;
      line-height: 1.3;
      padding: 12px 16px;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
      transition: filter 0.1s, transform 0.1s;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .emergency-btn:active { filter: brightness(0.85); transform: scale(0.98); }

    #btn-safe { background: #1a5c2a; }
    #btn-side { background: #b85500; }
    #btn-help { background: #8b0000; }

    #settings-trigger {
      position: fixed;
      bottom: max(env(safe-area-inset-bottom, 10px), 14px);
      left: 16px;
      background: transparent;
      border: none;
      font-size: 24px;
      cursor: pointer;
      opacity: 0.35;
      padding: 8px;
      -webkit-tap-highlight-color: transparent;
      z-index: 100;
    }
    #settings-trigger:active { opacity: 0.7; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      top: max(env(safe-area-inset-top, 0px), 0px);
      right: 0; left: 0;
      background: rgba(30,30,30,0.97);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      padding: 16px 20px;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      border-bottom: 1px solid #333;
    }
    #toast.show { opacity: 1; }

    .field-group { display: flex; flex-direction: column; gap: 6px; }

    .color-dot {
      display: inline-block;
      width: 12px; height: 12px;
      border-radius: 50%;
      margin-left: 6px;
      vertical-align: middle;
    }

    .divider { height: 1px; background: #222; }

    .phone-hint { font-size: 12px; color: #555; margin-top: 2px; }
  </style>
</head>
<body>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Setup Screen -->
  <div id="setup-screen" class="screen form-screen">
    <h1>הגדרת אפליקציית החירום</h1>
    <div class="instruction">
      לחיצה על כפתור <strong>תפתח ווטסאפ עם ההודעה מוקלדת</strong>.<br>
      הכנס מספר טלפון <strong>או</strong> קישור לקבוצת ווטסאפ.
    </div>

    <div class="field-group">
      <label for="setup-phone1">📞 מספר טלפון / 👥 קישור לקבוצה</label>
      <input type="text" id="setup-phone1" placeholder="050-1234567 או https://chat.whatsapp.com/..." autocomplete="off" autocorrect="off" spellcheck="false">
      <span class="phone-hint">מספר: 050-1234567 | קישור: הדבק קישור של קבוצת ווטסאפ</span>
    </div>

    <span class="error-msg" id="setup-error">יש להזין מספר טלפון תקין או קישור לקבוצה</span>
    <button class="btn-primary" id="setup-save">שמור והתחל</button>
  </div>

  <!-- Main Screen -->
  <div id="main-screen" class="screen">
    <button class="emergency-btn" id="btn-safe">אני במרחב מוגן 🟢</button>
    <button class="emergency-btn" id="btn-side">בדרך — נשכבתי בצד 🟡</button>
    <button class="emergency-btn" id="btn-help">צריך עזרה! 🔴</button>
    <button id="settings-trigger" aria-label="הגדרות">⚙️</button>
  </div>

  <!-- Settings Screen -->
  <div id="settings-screen" class="screen form-screen">
    <button class="btn-back" id="settings-back">← חזור</button>
    <h1>הגדרות</h1>

    <div class="field-group">
      <label for="s-phone1">📞 מספר טלפון / 👥 קישור לקבוצה</label>
      <input type="text" id="s-phone1" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <span class="error-msg" id="settings-phone-error">יש להזין מספר טלפון תקין או קישור לקבוצה</span>

    <div class="divider"></div>

    <div class="field-group">
      <label for="settings-msg1"><span class="color-dot" style="background:#1a5c2a"></span>הודעה — כפתור ירוק</label>
      <input type="text" id="settings-msg1" class="msg-input">
    </div>
    <div class="field-group">
      <label for="settings-msg2"><span class="color-dot" style="background:#b85500"></span>הודעה — כפתור כתום</label>
      <input type="text" id="settings-msg2" class="msg-input">
    </div>
    <div class="field-group">
      <label for="settings-msg3"><span class="color-dot" style="background:#8b0000"></span>הודעה — כפתור אדום</label>
      <input type="text" id="settings-msg3" class="msg-input">
    </div>

    <button class="btn-back" id="open-mobile-btn" style="align-self:center">📱 פתח בסלולר</button>
    <button class="btn-primary" id="settings-save">שמור</button>
  </div>

  <!-- Mobile QR Screen -->
  <div id="mobile-screen" class="screen form-screen">
    <button class="btn-back" id="mobile-back">← חזור</button>
    <h1>פתח בסלולר</h1>
    <div class="instruction">סרוק עם המצלמה של הטלפון</div>
    <img id="qr-img" src="" alt="QR Code"
      style="width:220px;height:220px;border-radius:12px;background:#fff;
             padding:12px;align-self:center;display:block;">
    <div id="qr-url"
      style="word-break:break-all;font-size:14px;color:#aaa;
             text-align:center;padding:0 8px;
             user-select:text;-webkit-user-select:text;"></div>
  </div>

  <script>
    const DEFAULTS = {
      msg_1: 'אני במרחב מוגן 🟢',
      msg_2: 'בדרך — נשכבתי בצד 🟡',
      msg_3: 'צריך עזרה! 🔴'
    };

    function get(key) { return localStorage.getItem(key) || ''; }
    function set(key, val) { localStorage.setItem(key, val); }
    function msg(n) { return get('msg_' + n) || DEFAULTS['msg_' + n]; }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    let toastTimer = null;

    // ── Target helpers ────────────────────────────────────────────────
    function isLink(raw) { return /^https?:\/\//i.test(raw.trim()); }

    function normalizePhone(raw) {
      let d = raw.replace(/\D/g, '');
      if (d.startsWith('972')) return d;
      if (d.startsWith('0')) return '972' + d.slice(1);
      return d;
    }

    function isValidPhone(raw) {
      const d = raw.replace(/\D/g, '');
      return d.length >= 9 && d.length <= 15;
    }

    function isValidTarget(raw) {
      return isLink(raw) || isValidPhone(raw);
    }

    // ── Button labels ─────────────────────────────────────────────────
    function syncButtonLabels() {
      document.getElementById('btn-safe').textContent = msg(1);
      document.getElementById('btn-side').textContent = msg(2);
      document.getElementById('btn-help').textContent = msg(3);
    }

    // ── Emergency handler ─────────────────────────────────────────────
    function showToast(text) {
      const t = document.getElementById('toast');
      t.textContent = text;
      t.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
    }

    function handleEmergency(msgText) {
      const target = get('phone_1');
      if (!target) return;
      const encoded = encodeURIComponent(msgText);
      if (isLink(target)) {
        navigator.clipboard.writeText(msgText).catch(() => {});
        window.open(target, '_blank');
        showToast('ההודעה הועתקה — הדבק בווטסאפ ושלח');
      } else {
        window.open(
          'https://api.whatsapp.com/send?phone=' + normalizePhone(target) + '&text=' + encoded,
          '_blank'
        );
        showToast('ווטסאפ נפתח — שלח את ההודעה');
      }
    }

    // ── Setup screen ──────────────────────────────────────────────────
    document.getElementById('setup-save').addEventListener('click', () => {
      const p1 = document.getElementById('setup-phone1').value.trim();
      const err = document.getElementById('setup-error');

      if (!p1 || !isValidTarget(p1)) {
        err.classList.add('visible');
        return;
      }
      err.classList.remove('visible');

      set('phone_1', p1);
      set('wa_seen', '1');

      syncButtonLabels();
      showScreen('main-screen');
    });

    document.getElementById('setup-phone1').addEventListener('input', () => {
      document.getElementById('setup-error').classList.remove('visible');
    });

    // ── Main screen buttons ───────────────────────────────────────────
    [1, 2, 3].forEach(n => {
      const ids = ['btn-safe', 'btn-side', 'btn-help'];
      document.getElementById(ids[n - 1]).addEventListener('click', () => handleEmergency(msg(n)));
    });

    document.getElementById('settings-trigger').addEventListener('click', () => {
      document.getElementById('s-phone1').value = get('phone_1');
      document.getElementById('settings-msg1').value = msg(1);
      document.getElementById('settings-msg2').value = msg(2);
      document.getElementById('settings-msg3').value = msg(3);
      document.getElementById('settings-phone-error').classList.remove('visible');
      showScreen('settings-screen');
    });

    // ── Settings screen ───────────────────────────────────────────────
    document.getElementById('settings-back').addEventListener('click', () => showScreen('main-screen'));

    document.getElementById('settings-save').addEventListener('click', () => {
      const p1 = document.getElementById('s-phone1').value.trim();
      const err = document.getElementById('settings-phone-error');

      if (!p1 || !isValidTarget(p1)) {
        err.classList.add('visible');
        return;
      }
      err.classList.remove('visible');

      set('phone_1', p1);

      const m1 = document.getElementById('settings-msg1').value.trim();
      const m2 = document.getElementById('settings-msg2').value.trim();
      const m3 = document.getElementById('settings-msg3').value.trim();
      if (m1) set('msg_1', m1);
      if (m2) set('msg_2', m2);
      if (m3) set('msg_3', m3);

      syncButtonLabels();
      showScreen('main-screen');
    });

    // ── Mobile QR screen ──────────────────────────────────────────────
    document.getElementById('open-mobile-btn').addEventListener('click', () => {
      const url = window.location.origin + window.location.pathname;
      document.getElementById('qr-img').src =
        'https://api.qrserver.com/v1/create-qr-code/?size=250x250&color=000000&bgcolor=ffffff&data=' +
        encodeURIComponent(url);
      document.getElementById('qr-url').textContent = url;
      showScreen('mobile-screen');
    });
    document.getElementById('mobile-back').addEventListener('click', () => showScreen('settings-screen'));

    // ── Boot ──────────────────────────────────────────────────────────
    function boot() {
      syncButtonLabels();
      if (!get('phone_1') && !get('wa_seen')) {
        showScreen('setup-screen');
      } else {
        showScreen('main-screen');
      }
    }

    boot();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
